name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install MyST
        run: npm install -g mystmd

      - name: Build MyST docs
        run: |
          cd docs
          myst build --html

      - name: Assemble site
        run: |
          mkdir -p _site
          # Landing page from site/
          cp site/index.html _site/
          cp site/icon.ico _site/
          cp site/crow-icon-white.ico _site/
          cp site/crow-icon-white.svg _site/
          cp site/crow-logo.svg _site/
          # MyST docs at /docs
          cp -r docs/_build/html _site/docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
