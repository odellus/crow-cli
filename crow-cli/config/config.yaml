# config.yaml for the spec at
# ../src/crow_acp/agent/config.py
mcpServers:
  crow-mcp:
    transport: stdio
    command: uv
    args:
      - --project
      - /home/thomas/src/nid/crow-mcp
      - run
      - crow-mcp

db_uri: postgresql://postgres:${POSTGRES_PASSWORD}@localhost:${POSTGRES_PORT}/postgres
# db_uri: sqlite:///${HOME}/.crow/crow.db

###
providers:
  braintrust:
    api_key: ${BRAINTRUST_API_KEY}
    base_url: https://d3jp9my702tbm7.cloudfront.net/v1/proxy

###
models:
  claude-opus-4.6:
    provider: zai
    model: arn:aws:bedrock:us-east-1:166979434163:inference-profile/us.anthropic.claude-opus-4-6-v1

TERMINAL_TOOL: terminal
WRITE_TOOL: write
READ_TOOL: read
EDIT_TOOL: edit
SEARCH_TOOL: web_search
FETCH_TOOL: web_fetch

# Compaction parameters
MAX_COMPACT_TOKENS: 120000
N_STEPS_BACK_COMPACT: 8

max_steps_per_turn: 100
max_retries_per_step: 3
